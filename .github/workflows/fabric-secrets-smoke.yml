name: Fabric Secrets Smoke

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 5
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      TENCENT_DEPLOY_KUBECONFIG_B64: ${{ secrets.TENCENT_DEPLOY_KUBECONFIG_B64 }}
      TENCENT_MUTATION_SECRET_ID: ${{ secrets.TENCENT_MUTATION_SECRET_ID }}
      TENCENT_MUTATION_SECRET_KEY: ${{ secrets.TENCENT_MUTATION_SECRET_KEY }}
      OPL_OPERATOR_TOKEN: ${{ secrets.OPL_OPERATOR_TOKEN }}
    steps:
      - name: Check required secrets are injected
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for key in \
            DATABASE_URL \
            TENCENT_DEPLOY_KUBECONFIG_B64 \
            TENCENT_MUTATION_SECRET_ID \
            TENCENT_MUTATION_SECRET_KEY
          do
            if [ -z "${!key:-}" ]; then
              echo "::error::$key is missing"
              missing=1
            else
              echo "$key=set"
            fi
          done
          if [ -z "${OPL_OPERATOR_TOKEN:-}" ]; then
            echo "::warning::OPL_OPERATOR_TOKEN is missing; full live e2e will remain blocked until it is configured"
          else
            echo "OPL_OPERATOR_TOKEN=set"
          fi
          exit "$missing"

      - name: Decode kubeconfig without printing it
        shell: bash
        run: |
          set -euo pipefail
          kubeconfig="$RUNNER_TEMP/fabric-kubeconfig"
          printf '%s' "$TENCENT_DEPLOY_KUBECONFIG_B64" | base64 -d > "$kubeconfig"
          test -s "$kubeconfig"
          grep -q '^current-context:' "$kubeconfig"
          grep -q 'server:' "$kubeconfig"
          echo "kubeconfig_decoded=true"
