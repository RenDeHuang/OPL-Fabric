apiVersion: v1
kind: ServiceAccount
metadata:
  name: opl-fabric-api
  labels:
    app.kubernetes.io/name: opl-fabric-api
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: opl-fabric-api
  labels:
    app.kubernetes.io/name: opl-fabric-api
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["create", "get", "update", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "get", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims", "secrets"]
    verbs: ["create", "get", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["create", "get", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: opl-fabric-api
  labels:
    app.kubernetes.io/name: opl-fabric-api
subjects:
  - kind: ServiceAccount
    name: opl-fabric-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: opl-fabric-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opl-fabric-api
  labels:
    app.kubernetes.io/name: opl-fabric-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opl-fabric-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opl-fabric-api
    spec:
      serviceAccountName: opl-fabric-api
      containers:
        - name: api
          image: opl-fabric-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8787
          env:
            - name: PORT
              value: "8787"
            - name: OPL_FABRIC_CONFIG_DIR
              value: /etc/opl-fabric/config
            - name: OPL_FABRIC_WORKER_ENABLED
              value: "false"
            - name: OPL_FABRIC_WORKER_OWNER
              value: fabric-api
            - name: OPL_FABRIC_WORKER_INTERVAL
              value: 5s
            - name: OPL_FABRIC_WORKER_LEASE_TTL
              value: 60s
            - name: OPL_FABRIC_WORKER_BATCH_SIZE
              value: "10"
            - name: OPL_K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OPL_WORKSPACE_IMAGE
              value: ghcr.io/gaofeng21cn/one-person-lab-app:latest
            - name: OPL_WORKSPACE_DOMAIN
              value: workspace.medopl.cn
            - name: OPL_WORKSPACE_WEBUI_PORT
              value: "3000"
            - name: OPL_WORKSPACE_DATA_DIR
              value: /data
            - name: OPL_WORKSPACE_PROJECTS_DIR
              value: /projects
            - name: OPL_WORKSPACE_STORAGE_CLASS
              value: cbs
            - name: OPL_INGRESS_CLASS
              value: qcloud
            - name: OPL_IMAGE_PULL_SECRET_NAME
              value: tcr-pull-secret
            - name: TENCENT_TKE_REGION
              value: ap-guangzhou
            - name: TENCENT_DEPLOY_CLUSTER_ID
              value: cls-xxxxxxxx
            - name: TENCENT_TCR_REGISTRY
              value: registry.example.com
            - name: TENCENT_TCR_NAMESPACE
              value: opl
            - name: TENCENT_TCR_REGION
              value: ap-guangzhou
            - name: OPL_TKE_INSTANCE_CHARGE_TYPE
              value: POSTPAID_BY_HOUR
            - name: OPL_TKE_ALLOW_NODEPOOL_MUTATION
              value: "false"
            - name: OPL_STAGING_E2E_ALLOW_LIVE
              value: "false"
            - name: OPL_CODEX_MODEL
              value: gpt-5.5
            - name: OPL_CODEX_REASONING_EFFORT
              value: xhigh
            - name: OPL_CODEX_BASE_URL
              value: https://gflabtoken.cn/v1
            - name: CODEX_HOME
              value: /data/codex
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: opl-fabric-api-secrets
                  key: DATABASE_URL
            - name: OPL_OPERATOR_TOKEN
              valueFrom:
                secretKeyRef:
                  name: opl-fabric-api-secrets
                  key: OPL_OPERATOR_TOKEN
            - name: OPL_CODEX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: opl-fabric-api-secrets
                  key: OPL_CODEX_API_KEY
                  optional: true
            - name: TENCENT_MUTATION_SECRET_ID
              valueFrom:
                secretKeyRef:
                  name: opl-fabric-api-secrets
                  key: TENCENT_MUTATION_SECRET_ID
            - name: TENCENT_MUTATION_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: opl-fabric-api-secrets
                  key: TENCENT_MUTATION_SECRET_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: opl-fabric-api
  labels:
    app.kubernetes.io/name: opl-fabric-api
spec:
  selector:
    app.kubernetes.io/name: opl-fabric-api
  ports:
    - name: http
      port: 8787
      targetPort: 8787
